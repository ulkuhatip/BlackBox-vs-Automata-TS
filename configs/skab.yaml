dataset:
  name: skab
  raw_root: data/raw/skab
  processed_root: data/processed/skab
  groups:
    - valve1
    - valve2
  delimiter: ";"
  target_column: anomaly
  metadata_columns:
    - datetime
    - changepoint
    - source_group
    - source_file
  split:
    strategy: stratified_group_kfold
    n_splits: 5
    group_column: source_file

preprocessing:
  missing_value_strategy: none
  scaler: standard
  pca_enabled: true
  pca_components: 1

deep_learning:
  enabled_models:
    - lstm
    - gru
    - cnn1d
  sequence_length: 32
  batch_size: 32
  epochs: 50
  early_stopping_patience: 5

automata:
  window_size: 4
  alphabet_size: 3
  param_grid:
    window_size: [3, 4, 5, 6]
    alphabet_size: [3, 4, 5, 6]

experiment:
  seeds: [42, 123, 2026, 7, 999]
  scenarios:
    - original
    - gaussian_noise
    - unseen
